<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DICE-M Attendance System</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: linear-gradient(to bottom right, #1a9291, #4b3082); width: 100%; min-height: 100vh; padding: 40px; display: flex; flex-direction: column; align-items: center; color: white; text-align: center; }
        @media (min-width: 481px) { .card { width: 400px; min-height: auto; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); } }
        input, select, button { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 20px; border: none; font-size: 16px; box-sizing: border-box; }
        button { background: #ff4d4d; color: white; font-weight: bold; cursor: pointer; }
        button:disabled { background: #7f8c8d; }
        .msg { font-weight: bold; margin-top: 10px; min-height: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://raw.githubusercontent.com/dicem4654/dice-mattendance/main/DICE-M%20LOGO.png" width="100" alt="Logo">
        <h2>DICE-M ACADEMY</h2>
        <div style="width: 100%;">
            <input type="text" id="student" placeholder="Full Name">
            <select id="role" onchange="document.getElementById('pinWrap').style.display = (this.value=='Teacher'?'block':'none')">
                <option value="Student">Student</option>
                <option value="Teacher">Teacher</option>
            </select>
            <div id="pinWrap" style="display:none;"><input type="password" id="pin" placeholder="Teacher PIN"></div>
            <button id="btn" onclick="process()">Submit Attendance</button>
            <p id="msg" class="msg"></p>
        </div>
    </div>

    <script>
        const scriptURL = "YOUR_APPS_SCRIPT_URL"; // Replace with your Web App URL
        const target = { lat: 24.87077, lon: 92.55999 };
        const today = new Date().toISOString().split('T')[0];

        function process() {
            const name = document.getElementById("student").value.trim();
            const role = document.getElementById("role").value;
            const pin = document.getElementById("pin").value;
            const msg = document.getElementById("msg");
            const scanKey = 'scans_' + today;
            let scans = parseInt(localStorage.getItem(scanKey) || "0");

            if (!name) return alert("Enter Name");
            if (role === "Student" && scans >= 2) return alert("Device Limit: Entry & Exit already marked.");

            msg.innerText = "Checking Location... 🛰️";
            navigator.geolocation.getCurrentPosition((pos) => {
                const dist = Math.sqrt(Math.pow(pos.coords.latitude - target.lat, 2) + Math.pow(pos.coords.longitude - target.lon, 2)) * 111320;
                if (dist > 200) {
                    msg.innerText = "Too far from center!";
                } else {
                    save(name, role, pin, scanKey, scans);
                }
            }, () => msg.innerText = "Location access denied.");
        }

        function save(name, role, pin, key, count) {
            document.getElementById("btn").disabled = true;
            fetch(scriptURL, {
                method: "POST",
                body: JSON.stringify({ name, role, pin, date: today })
            }).then(r => r.text()).then(txt => {
                if (txt.includes("Success")) {
                    if (role === "Student") localStorage.setItem(key, (count + 1).toString());
                    document.getElementById("msg").innerText = "Success! ✅";
                    document.getElementById("student").value = "";
                } else {
                    document.getElementById("msg").innerText = txt;
                }
                document.getElementById("btn").disabled = false;
            });
        }
    </script>
</body>
</html>
